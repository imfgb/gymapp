# Curated exercise seed for gymapp.
#
# Loaded idempotently by the data migration in
# gymapp/apps/exercises/migrations/0002_seed_catalog.py.
#
# Naming rules:
#   - slug: kebab-case English. Unique across the global catalogue.
#   - name: Title Case English. Used in UI; never translate to Spanish (decision #8).
#   - equipment: must match a slug in the `equipment` block below.
#   - primary_muscles / secondary_muscles: slugs from the `muscle_groups` block.
#   - category: compound (multi-joint) or isolation (single-joint).
#   - unilateral: true if performed one side at a time.
#   - alternatives: directional list of {slug, reason}. The loader auto-mirrors
#     each pair so A <-> B both exist (unless `mirror: false`).

muscle_groups:
  - {slug: chest, name: Chest, region: chest}
  - {slug: lats, name: Lats, region: back}
  - {slug: traps-mid, name: Mid-Traps / Rhomboids, region: back}
  - {slug: traps-upper, name: Upper Traps, region: back}
  - {slug: lower-back, name: Spinal Erectors, region: back}
  - {slug: delts-front, name: Front Delts, region: shoulders}
  - {slug: delts-side, name: Side Delts, region: shoulders}
  - {slug: delts-rear, name: Rear Delts, region: shoulders}
  - {slug: biceps, name: Biceps, region: arms}
  - {slug: triceps, name: Triceps, region: arms}
  - {slug: forearms, name: Forearms, region: arms}
  - {slug: quads, name: Quads, region: legs}
  - {slug: hamstrings, name: Hamstrings, region: legs}
  - {slug: glutes, name: Glutes, region: legs}
  - {slug: calves, name: Calves, region: legs}
  - {slug: abductors, name: Abductors, region: legs}
  - {slug: adductors, name: Adductors, region: legs}
  - {slug: abs, name: Abs, region: core}
  - {slug: obliques, name: Obliques, region: core}

equipment:
  - {slug: barbell, name: Barbell}
  - {slug: ez-bar, name: EZ-Bar}
  - {slug: dumbbell, name: Dumbbell}
  - {slug: machine, name: Machine}
  - {slug: cable, name: Cable}
  - {slug: bodyweight, name: Bodyweight}
  - {slug: smith, name: Smith Machine}

