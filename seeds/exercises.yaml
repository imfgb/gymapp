    alternatives:
      - {slug: dumbbell-bench-press, reason: "Same movement, swap if barbell is busy."}
      - {slug: smith-bench-press, reason: "Smith variant for fixed-path safety."}
      - {slug: machine-chest-press, reason: "Plate-loaded machine alternative."}

  - slug: incline-bench-press
    name: Incline Bench Press
    equipment: barbell
    primary_muscles: [chest]
    secondary_muscles: [delts-front, triceps]
    category: compound
    unilateral: false
