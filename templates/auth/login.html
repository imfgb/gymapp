{% extends "base.html" %}
{% block title %}Iniciar sesión · Smart Fit Altama{% endblock %}

{% block content %}
<div class="mx-auto max-w-sm">
  <h1 class="text-2xl font-semibold mb-6">Iniciar sesión</h1>

  <form method="post" class="space-y-4">
    {% csrf_token %}

    {% if form.non_field_errors %}
      <div class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
        {{ form.non_field_errors }}
      </div>
    {% endif %}

    <label class="block">
      <span class="text-sm text-slate-700">Correo</span>
      <input type="email" name="username" autocomplete="username" required
             class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2
                    focus:border-slate-900 focus:ring-1 focus:ring-slate-900">
    </label>

    <label class="block">
      <span class="text-sm text-slate-700">Contraseña</span>
      <input type="password" name="password" autocomplete="current-password" required
             class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2
                    focus:border-slate-900 focus:ring-1 focus:ring-slate-900">
    </label>

    <input type="hidden" name="next" value="{{ next }}">

    <button type="submit"
            class="w-full rounded-md bg-brand text-ink py-2 text-sm font-medium
                   hover:bg-brand-dark">
      Entrar
    </button>
  </form>
</div>
{% endblock %}
