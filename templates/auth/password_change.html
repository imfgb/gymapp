{% extends "base.html" %}
{% block title %}Cambiar contraseña · GymApp{% endblock %}

{% block content %}
<div class="mx-auto max-w-sm">
  <h1 class="text-2xl font-semibold mb-6">Cambiar contraseña</h1>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit"
            class="w-full rounded-md bg-brand text-white py-2 text-sm font-medium
                   hover:bg-brand-dark">
      Guardar
    </button>
  </form>
</div>
{% endblock %}
