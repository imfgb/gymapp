{% extends "base.html" %}
{% block title %}Registrar medición · Smart Fit Altama{% endblock %}

{% block content %}
<h1 class="mb-4 text-2xl font-semibold">Registrar medición</h1>
<form method="post" class="max-w-sm space-y-4">
  {% csrf_token %}
  <label class="block">
    <span class="text-sm text-slate-700">Peso (kg)</span>
    <input type="number" name="weight_kg" step="0.1" min="0" required
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm text-slate-700">% grasa corporal <span class="text-xs text-slate-400">(opcional)</span></span>
    <input type="number" name="body_fat_pct" step="0.1" min="0" max="80"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm text-slate-700">% músculo <span class="text-xs text-slate-400">(opcional, si tu báscula lo da)</span></span>
    <input type="number" name="muscle_pct" step="0.1" min="0" max="100"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm text-slate-700">Grasa visceral <span class="text-xs text-slate-400">(opcional, escala 1–30)</span></span>
    <input type="number" name="visceral_fat" step="0.5" min="0" max="60"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>
  <p class="text-xs text-slate-400">El BMI se calcula solo con tu peso y altura.</p>
  <label class="block">
    <span class="text-sm text-slate-700">Notas <span class="text-xs text-slate-400">(opcional)</span></span>
    <input type="text" name="notes" maxlength="200"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>
  <div class="flex gap-2">
    <button type="submit" class="rounded-md bg-brand px-4 py-2 text-sm text-ink hover:bg-brand-dark">Guardar</button>
    <a href="{% url 'metrics:list' %}" class="rounded-md border border-slate-300 px-4 py-2 text-sm hover:bg-slate-50">Cancelar</a>
  </div>
</form>
{% endblock %}
