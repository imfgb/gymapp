{% extends "base.html" %}
{% block title %}Perfil · Smart Fit Altama{% endblock %}

{% block content %}
<h1 class="mb-4 text-2xl font-semibold">Mi perfil</h1>
<form method="post" class="max-w-md space-y-4">
  {% csrf_token %}

  <label class="block">
    <span class="text-sm text-slate-700">Altura (cm)</span>
    <input type="number" name="height_cm" min="100" max="250"
           value="{{ profile.height_cm|default:'' }}"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>

  <label class="block">
    <span class="text-sm text-slate-700">Fecha de nacimiento</span>
    <input type="date" name="date_of_birth"
           value="{{ profile.date_of_birth|date:'Y-m-d' }}"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>

  <label class="block">
    <span class="text-sm text-slate-700">Sexo</span>
    <select name="sex" class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
      <option value="" {% if not profile.sex %}selected{% endif %}>—</option>
      <option value="male" {% if profile.sex == "male" %}selected{% endif %}>Hombre</option>
      <option value="female" {% if profile.sex == "female" %}selected{% endif %}>Mujer</option>
    </select>
    <span class="mt-1 block text-xs text-slate-400">Se usa para el cálculo de calorías (Mifflin-St Jeor).</span>
  </label>

  <label class="block">
    <span class="text-sm text-slate-700">Nivel de actividad</span>
    <select name="activity_level" class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
      <option value="sedentary" {% if profile.activity_level == "sedentary" %}selected{% endif %}>Sedentario (poco o nada de ejercicio)</option>
      <option value="light" {% if profile.activity_level == "light" %}selected{% endif %}>Ligero (1-3 días/sem)</option>
      <option value="moderate" {% if profile.activity_level == "moderate" %}selected{% endif %}>Moderado (3-5 días/sem)</option>
      <option value="active" {% if profile.activity_level == "active" %}selected{% endif %}>Activo (6-7 días/sem)</option>
      <option value="very_active" {% if profile.activity_level == "very_active" %}selected{% endif %}>Muy activo (físico + 2x/día)</option>
    </select>
  </label>

  <label class="block">
    <span class="text-sm text-slate-700">Estilo de entrenamiento</span>
    <select name="training_style"
            class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
      {% for value, label in training_styles %}
        <option value="{{ value }}" {% if profile.training_style == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </label>

  <label class="block">
    <span class="text-sm text-slate-700">Meta</span>
    <select name="training_goal"
            class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
      {% for value, label in training_goals %}
        <option value="{{ value }}" {% if profile.training_goal == value %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </label>

  <label class="block">
    <span class="text-sm text-slate-700">Descanso por defecto (segundos)</span>
    <input type="number" name="default_rest_seconds" min="15" max="600"
           value="{{ profile.default_rest_seconds }}"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>

  <div class="flex gap-2">
    <button type="submit" class="rounded-md bg-brand px-4 py-2 text-sm text-ink hover:bg-brand-dark">Guardar</button>
    <a href="{% url 'metrics:list' %}" class="rounded-md border border-slate-300 px-4 py-2 text-sm hover:bg-slate-50">Cancelar</a>
  </div>
</form>
{% endblock %}
