{% extends "base.html" %}
{% load l10n %}
{% block title %}Editar PR · Smart Fit Altama{% endblock %}

{% block content %}
<h1 class="mb-4 text-2xl font-semibold">Editar PR — {{ pr.exercise.name }}</h1>
<form method="post" class="max-w-sm space-y-4">
  {% csrf_token %}
  <label class="block">
    <span class="text-sm text-slate-700">Peso (kg)</span>
    <input type="number" name="weight_kg" step="0.5" min="0" required
           value="{{ pr.weight_kg|unlocalize }}"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>
  <label class="block">
    <span class="text-sm text-slate-700">Reps</span>
    <input type="number" name="reps" min="1" required
           value="{{ pr.reps }}"
           class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2">
  </label>
  <div class="flex gap-2">
    <button type="submit" class="rounded-md bg-brand px-4 py-2 text-sm text-ink hover:bg-brand-dark">Guardar</button>
    <a href="{% url 'prs:detail' pr.exercise.slug %}" class="rounded-md border border-slate-300 px-4 py-2 text-sm hover:bg-slate-50">Cancelar</a>
  </div>
</form>
{% endblock %}
